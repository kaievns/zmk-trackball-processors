description: |
  Layer-based trackball DPI / acceleration profiles.

  Each child node defines a profile with a list of layers it applies to.
  When the active layer changes, the matching profile is activated.
  If multiple profiles match, the one whose layer has the highest index wins.
  If no profile matches the current layer, the first profile is used as default.

compatible: "zmk,trackball-profiles"

child-binding:
  description: A single trackball profile.
  properties:
    layers:
      type: array
      required: true
      description: |
        List of layer indices this profile applies to.
        Example: layers = <0 1 2>; applies to layers 0, 1, and 2.

    dpi:
      type: int
      required: true
      description: Sensor CPI (200-3200, multiple of 200).

    acceleration-multiplier:
      type: int
      required: true
      description: |
        Base speed multiplier, fixed-point x100.
        100 = 1.0x, 150 = 1.5x, 80 = 0.8x.

    acceleration-threshold:
      type: int
      required: true
      description: |
        Delta magnitude (sensor counts per sample) below which
        acceleration is not applied — just the base multiplier.

    acceleration-exponent:
      type: int
      required: true
      description: |
        Acceleration curve selector, fixed-point x100.
        0       = linear (no acceleration curve)
        1-40    = gentle  (d^1.3 lookup table)
        41-65   = medium  (d^1.5 lookup table)
        66-100  = strong  (d^2.0 lookup table)
