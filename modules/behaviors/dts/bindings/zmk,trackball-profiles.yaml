description: |
  Layer-based trackball DPI / acceleration profiles.

  Each child node defines a profile with a list of layers it applies to.
  When the active layer changes, the matching profile is activated.
  If multiple profiles match, the one whose layer has the highest index wins.
  If no profile matches the current layer, the first profile is used as default.

compatible: "zmk,trackball-profiles"

child-binding:
  description: A single trackball profile.
  properties:
    layers:
      type: array
      required: true
      description: |
        List of layer indices this profile applies to.
        Example: layers = <0 1 2>; applies to layers 0, 1, and 2.

    dpi:
      type: int
      required: true
      description: Sensor CPI (200-3200, multiple of 200).

    acceleration-exponent:
      type: int
      required: true
      description: |
        Power curve exponent, fixed-point x100.
        100 = linear (no acceleration)
        120 = smooth, mild (MX Ergo-like)
        140 = moderate
        200 = aggressive
