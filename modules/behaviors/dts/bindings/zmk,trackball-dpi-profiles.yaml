description: |
  Layer-based trackball DPI switcher.

  Set a default DPI on the node itself. Add child nodes to override
  DPI for specific layers. Unmatched layers use the default.

    trackball_dpi {
        compatible = "zmk,trackball-dpi-profiles";
        dpi = <600>;        // default for all layers

        scroll {
            layers = <9>;   // override for scroll layer
            dpi = <400>;
        };
    };

compatible: "zmk,trackball-dpi-profiles"

properties:
  dpi:
    type: int
    required: true
    description: Default sensor CPI (200-3200, multiple of 200).

child-binding:
  description: Layer-specific DPI override.
  properties:
    layers:
      type: array
      required: true
      description: Layer indices this override applies to.

    dpi:
      type: int
      required: true
      description: Sensor CPI for these layers.
